# ============================================================
# RL-Soccer POCA 训练配置 v2.3
# ============================================================
# 配合改动:
#   - 球碰墙反弹 (不重置)
#   - 四角惩罚
#   - 球门物理建模 (仅正面进球)
#   - 奖励塑形器 (potential + normalize + curriculum)
#   - 训练补丁 (gradient_clip + reward_norm + advantage_norm + entropy_decay + value_clip)
# ============================================================

behaviors:
  SoccerTwos:
    trainer_type: poca
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 0.0003
      beta: 0.01                # 0.005→0.01 初始高熵，配合 entropy_decay 衰减
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: constant

    network_settings:
      normalize: false
      hidden_units: 512
      num_layers: 2
      vis_encode_type: simple

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    keep_checkpoints: 5
    max_steps: 50000000
    time_horizon: 1000
    summary_freq: 10000

    self_play:
      save_steps: 50000
      team_change: 200000
      swap_steps: 2000
      window: 10
      play_against_latest_model_ratio: 0.5
      initial_elo: 1200.0

environment_parameters:
  ball_touch: 0.0
  goal_reward: 1.0
