# ============================================================
# 奖励塑形配置 (独立文件，不混入训练 YAML)
# ============================================================
# 用法:
#   from rlsoccer.reward_shaper import load_reward_shaper
#   shaper = load_reward_shaper("config/reward_shaping.yaml")
# ============================================================

reward_shaping:
  event_weights:
    goal_scored: 1.0
    goal_conceded: -1.0
    corner_trap: -0.15
    danger_zone: -0.001
    ball_touch: 0.2
    interception: 0.25
    pass_receive: 0.08
    shot_on_target: 0.5
    own_goal_risk: -0.25
    clearance: 0.2
    approach_ball: 0.02
    face_ball: 0.008
    possess_ball: 0.005
    defensive_position: 0.004
    offensive_half: 0.002
    dribble_forward: 0.003
    pressure: 0.002
    wall_collision: -0.15
    stuck: -0.008
    away_from_ball: -0.005
    teammate_bump: -0.03

  potential:
    enabled: true
    attack_weight: 0.01
    defense_weight: 0.005

  normalize:
    enabled: true
    momentum: 0.001

  curriculum:
    enabled: true
    total_steps: 50000000
    anneal_steps: 20000000

  gamma: 0.99
