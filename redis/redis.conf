# ============================================================
# Redis 训练日志缓存配置
# 参照 no20.txt 实训文档要求:
#   - maxmemory 2GB
#   - allkeys-lru 淘汰策略
#   - RDB 快照持久化
# ============================================================

# --- 内存管理 ---
maxmemory 2gb
maxmemory-policy allkeys-lru

# --- RDB 持久化 (每 5 分钟至少 1 次 key 变更时快照) ---
save 300 1
save 60 100
dbfilename dump.rdb
dir /data

# --- 网络 ---
bind 0.0.0.0
port 6379
tcp-keepalive 300
timeout 0

# --- 客户端 ---
maxclients 100

# --- 慢查询日志 ---
slowlog-log-slower-than 10000
slowlog-max-len 128

# --- 日志 ---
loglevel notice
logfile /data/redis.log

# --- 数据库 ---
databases 1
